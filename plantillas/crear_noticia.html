{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Crear Noticia{% endblock %}

{% block content %}
<div class="row mt-3">
    <div class="col-md-8 mx-auto">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h3 class="mb-0"><i class="bi bi-pencil-square"></i> Publicar Nueva Noticia</h3>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'lista_noticias' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Publicar Noticia</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
