{% extends 'base.html' %}

{% block contenido %}
<h1>Eliminar Artículo</h1>
<form action="" method="post">{% csrf_token %}
    <p>¿Estás seguro de que deseas eliminar el artículo "{{ articulo.titulo }}"?</p>
    <button class="btn btn-danger" type="submit">Eliminar</button>
    <a href="{% url 'detalle_articulo' articulo.pk %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>
{% endblock contenido %}
