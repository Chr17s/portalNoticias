{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block titulo %}-Introduzca su nueva contraseña{% endblock titulo %}
{% block contenido %}
<h1>Restablecer contraseña</h1>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" value="Cambiar mi contraseña" class="btn btn-success">
</form>
{% endblock contenido %}
