{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Recuperar Contraseña - El Periódico{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5 mb-5">
    <div class="col-md-6 col-lg-4 mt-4">
        
        <div class="text-center mb-5">
            <i class="bi bi-key display-4 text-dark mb-3 d-block"></i>
            <h2 class="font-serif fw-bold text-dark" style="letter-spacing: -0.5px;">Recuperar acceso</h2>
            <p class="text-muted mt-2">Ingresa tu correo electrónico y te enviaremos las instrucciones.</p>
        </div>
        
        <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-bold">Enviar Enlace</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
