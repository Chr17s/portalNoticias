{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h4 class="mb-0"><i class="bi bi-person-circle"></i> Configuración de Perfil</h4>
            </div>
            <div class="card-body p-4 row">
                
                <div class="col-md-4 text-center mb-4">
                    {% if user.avatar %}
                        <img src="{{ user.avatar.url }}" alt="Avatar" class="rounded-circle img-thumbnail mb-3" style="width: 150px; height: 150px; object-fit: cover;">
                    {% else %}
                        <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white mx-auto mb-3" style="width: 150px; height: 150px;">
                            <i class="bi bi-person" style="font-size: 5rem;"></i>
                        </div>
                    {% endif %}
                    <h5>{{ user.username }}</h5>
                    <p class="text-muted small">{{ user.email }}</p>
                </div>

                <div class="col-md-8">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-primary">Actualizar Perfil</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
